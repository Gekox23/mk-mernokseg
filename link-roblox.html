<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roblox Összekötés – Mezőkovácsházi Mérnökség</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;background:#0f1826;color:#dce8f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .box{background:#162233;border:1px solid #243347;border-radius:20px;padding:36px;max-width:440px;width:100%;text-align:center}
    h1{font-size:22px;margin-bottom:8px} h1 span{color:#ef7a14}
    p{color:#8fa4bc;font-size:14px;margin-bottom:24px;line-height:1.6}
    .btn{width:100%;padding:14px;border-radius:12px;border:none;font-size:16px;font-weight:700;cursor:pointer;background:#e4000f;color:#fff;display:flex;align-items:center;justify-content:center;gap:10px;text-decoration:none}
    .error{background:#2c1215;border:1px solid #5c1a1a;border-radius:8px;padding:10px;color:#f87171;font-size:13px;margin-bottom:16px;display:none}
  </style>
</head>
<body>
<div class="box">
  <h1>🎮 Roblox <span>Összekötés</span></h1>
  <p>Beléptél Discorddal! Most kösd össze a Roblox fiókodat is, hogy azonosítani tudjunk a szerveren.</p>
  <div class="error" id="errBox"></div>
  <a class="btn" id="robloxBtn" href="#">🎮 Belépés Robloxxal</a>
</div>
<script>
  const WORKER_URL = 'https://mk.gekox1111.workers.dev';
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  const error = params.get('error');

  if (!token) window.location.href = 'index.html';
  if (error === 'taken') {
    document.getElementById('errBox').textContent = 'Ez a Roblox fiók már más Discord fiókhoz van kötve!';
    document.getElementById('errBox').style.display = 'block';
  }

  async function init() {
    try {
      const res = await fetch(WORKER_URL + '/roblox-auth-url', {
        headers: { Authorization: 'Bearer ' + token }
      });
      const data = await res.json();
      document.getElementById('robloxBtn').href = data.url;
    } catch(e) {
      document.getElementById('errBox').textContent = 'Hálózati hiba, próbáld újra.';
      document.getElementById('errBox').style.display = 'block';
    }
  }
  init();
</script>
</body>
</html>
