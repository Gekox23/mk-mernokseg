<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foglalás – MK Mérnökség</title>
  <link rel="icon" type="image/png" href="assets/sarokLogo.png">
  <script>history.replaceState(null,'','/mk-mernokseg/foglalas'+window.location.search);</script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;background:#0f1826;color:#dce8f5;min-height:100vh}
    header{background:#121d2e;border-bottom:1px solid #243347;padding:14px 28px;display:flex;justify-content:space-between;align-items:center}
    .brand{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700}
    .brand img{height:30px}
    .brand span{color:#ef7a14}
    header a{color:#8fa4bc;font-size:13px}
    .container{max-width:600px;margin:48px auto;padding:0 24px}
    .card{background:#162233;border:1px solid #243347;border-radius:16px;padding:28px}
    h2{color:#ef7a14;margin-bottom:20px;font-size:20px}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:13px;color:#8fa4bc;margin-bottom:5px}
    .field p{font-size:15px}
    .btn{display:block;width:100%;padding:13px;background:#22c55e;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:20px}
    .btn:disabled{background:#1a2c42;color:#4a6580;cursor:not-allowed}
    .msg{border-radius:10px;padding:12px 16px;font-size:14px;margin-top:14px;display:none}
    .msg-ok{background:#0d2b1e;border:1px solid #166534;color:#86efac}
    .msg-err{background:#2c1215;border:1px solid #5c1a1a;color:#f87171}
    .msg-info{background:#1a2c42;border:1px solid #2b4668;color:#8fa4bc}
  </style>
</head>
<body>
<header>
  <div class="brand"><img src="assets/sarokLogo.png" alt="logo"> Mezőkovácsházi <span>&nbsp;Mérnökség</span></div>
  <a href="/mk-mernokseg/">← Főoldal</a>
</header>
<div class="container">
  <div class="card">
    <h2>✅ Esemény foglalás</h2>
    <div id="content"><p style="color:#4a6580">Betöltés...</p></div>
  </div>
</div>
<script>
  const WORKER='https://mk.gekox1111.workers.dev';
  const params=new URLSearchParams(window.location.search);
  const eventId=params.get('event');
  const token=localStorage.getItem('mk_token');
  async function init(){
    if(!eventId){show('<p style="color:#f87171">Érvénytelen link.</p>');return;}
    if(!token){show(`<p style="color:#7a94ad">A foglaláshoz be kell lépned Discord fiókoddal.</p><a href="/mk-mernokseg/" style="color:#ef7a14">← Főoldal</a>`);return;}
    try{
      const res=await fetch(WORKER+'/events');
      const events=await res.json();
      const ev=events.find(e=>e.id===eventId);
      if(!ev){show('<p style="color:#f87171">Az esemény nem található.</p>');return;}
      const start=new Date(ev.start_time).toLocaleString('hu-HU',{timeZone:'Europe/Budapest'});
      const end=new Date(ev.end_time).toLocaleString('hu-HU',{timeZone:'Europe/Budapest'});
      const typeLabel={toborzas:'🎮 Toborzás',foglalas:'📚 Oktatás',lezaras:'🚧 Útlezárás'};
      show(`<div class="field"><label>Esemény neve</label><p>${ev.title}</p></div>
        <div class="field"><label>Típus</label><p>${typeLabel[ev.type]||ev.type}</p></div>
        <div class="field"><label>Időpont</label><p>${start} – ${end}</p></div>
        ${ev.description?`<div class="field"><label>Leírás</label><p style="color:#7a94ad">${ev.description}</p></div>`:''}
        <button class="btn" id="bookBtn" onclick="book('${ev.id}')">✅ Jelentkezem</button>
        <div class="msg" id="bookMsg"></div>`);
    }catch(e){show('<p style="color:#f87171">Hiba az esemény betöltésekor.</p>');}
  }
  function show(html){document.getElementById('content').innerHTML=html;}
  async function book(id){
    const btn=document.getElementById('bookBtn');btn.disabled=true;btn.textContent='Küldés...';
    const msg=document.getElementById('bookMsg');
    try{
      const res=await fetch(WORKER+'/event/book',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},body:JSON.stringify({event_id:id})});
      const data=await res.json();
      if(res.ok){msg.className='msg msg-ok';msg.textContent='✅ Sikeresen jelentkeztél!';msg.style.display='block';btn.textContent='Jelentkezve ✓';}
      else{msg.className='msg msg-err';msg.textContent='❌ '+(data.error||'Ismeretlen hiba');msg.style.display='block';btn.disabled=false;btn.textContent='✅ Jelentkezem';}
    }catch(e){msg.className='msg msg-err';msg.textContent='❌ Hálózati hiba';msg.style.display='block';btn.disabled=false;btn.textContent='✅ Jelentkezem';}
  }
  init();
</script>
</body>
</html>
