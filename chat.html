<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Segítség / Chat – Mezőkovácsházi Mérnökség</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;background:#0f1826;color:#dce8f5;display:flex;flex-direction:column;height:100vh}
    header{background:#121d2e;border-bottom:1px solid #243347;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
    .brand{font-size:16px;font-weight:700}.brand span{color:#ef7a14}
    header a{color:#8fa4bc;font-size:13px}
    .chat-wrap{flex:1;display:flex;flex-direction:column;max-width:860px;width:100%;margin:0 auto;padding:0 16px}
    .chat-header{padding:20px 0 12px;border-bottom:1px solid #1f3047;margin-bottom:12px}
    .chat-header h2{font-size:18px}.chat-header p{color:#7a94ad;font-size:13px;margin-top:4px}
    .messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-bottom:12px}
    .msg{display:flex;gap:10px;align-items:flex-start}
    .msg img{width:34px;height:34px;border-radius:50%;border:2px solid #2b4668;flex-shrink:0}
    .msg-body{background:#162233;border:1px solid #1f3047;border-radius:12px;padding:10px 14px;max-width:680px}
    .msg-body .name{font-size:12px;color:#7a94ad;margin-bottom:4px;display:flex;gap:8px;align-items:center}
    .msg-body .name strong{color:#dce8f5;font-size:13px}
    .msg-body p{font-size:14px;line-height:1.5}
    .time-badge{font-size:11px;color:#4a6580}
    .roblox-tag{background:#1a2c42;color:#ffb86c;border-radius:999px;padding:1px 7px;font-size:11px}
    .input-area{background:#121d2e;border-top:1px solid #243347;padding:14px 16px;display:flex;gap:10px;align-items:center}
    .input-area input{flex:1;padding:11px 14px;border-radius:10px;border:1px solid #2b4668;background:#0f1826;color:#dce8f5;font-size:14px}
    .input-area button{padding:11px 18px;border-radius:10px;background:#5865F2;color:#fff;border:none;font-weight:700;cursor:pointer;font-size:14px}
    .login-notice{text-align:center;padding:32px;color:#7a94ad;font-size:14px}
    .login-notice a{color:#ef7a14}
  </style>
</head>
<body>
<header>
  <div class="brand">Mezőkovácsházi <span>Mérnökség</span></div>
  <a href="index.html">← Főoldal</a>
</header>
<div class="chat-wrap">
  <div class="chat-header">
    <h2>💬 Segítség / Chat</h2>
    <p>Kérdésed van? Írj üzenetet, egy munkatársunk válaszol!</p>
  </div>
  <div class="messages" id="messages"></div>
</div>
<div class="input-area" id="inputArea" style="display:none">
  <input type="text" id="msgInput" placeholder="Írj üzenetet..." maxlength="500" onkeydown="if(event.key==='Enter')sendMsg()">
  <button onclick="sendMsg()">▶ Küldés</button>
</div>
<div class="login-notice" id="loginNotice" style="display:none">
  A chathez <a href="index.html">be kell lépned</a> Discord fiókoddal.
</div>

<script>
  const WORKER_URL = 'https://mk.gekox1111.workers.dev';
  let currentUser = null;

  function getToken() { return localStorage.getItem('mk_token'); }

  async function init() {
    const token = getToken();
    if (token) {
      try {
        const res = await fetch(WORKER_URL + '/me', { headers: { Authorization: 'Bearer ' + token } });
        if (res.ok) currentUser = await res.json();
      } catch(e) {}
    }
    if (currentUser) {
      document.getElementById('inputArea').style.display = 'flex';
    } else {
      document.getElementById('loginNotice').style.display = 'block';
    }
    await loadMessages();
    setInterval(loadMessages, 5000);
  }

  async function loadMessages() {
    try {
      const res = await fetch(WORKER_URL + '/chat/messages');
      const msgs = await res.json();
      const container = document.getElementById('messages');
      const wasBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60;
      container.innerHTML = msgs.map(m => {
        const avatar = m.avatar
          ? `<img src="https://cdn.discordapp.com/avatars/${m.user_id}/${m.avatar}.png" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">`
          : `<img src="https://cdn.discordapp.com/embed/avatars/0.png">`;
        const time = new Date(m.created_at).toLocaleTimeString('hu-HU', { hour: '2-digit', minute: '2-digit' });
        return `<div class="msg">${avatar}<div class="msg-body"><div class="name"><strong>${esc(m.username)}</strong><span class="time-badge">${time}</span></div><p>${esc(m.message)}</p></div></div>`;
      }).join('');
      if (wasBottom) container.scrollTop = container.scrollHeight;
    } catch(e) {}
  }

  async function sendMsg() {
    const input = document.getElementById('msgInput');
    const msg = input.value.trim();
    if (!msg || !currentUser) return;
    input.value = '';
    try {
      await fetch(WORKER_URL + '/chat/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + getToken() },
        body: JSON.stringify({ message: msg })
      });
      await loadMessages();
    } catch(e) {}
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  init();
</script>
</body>
</html>
