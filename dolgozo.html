<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dolgozói Panel – MK Mérnökség</title>
  <link rel="icon" type="image/png" href="assets/sarokLogo.png">
  <script>history.replaceState(null,'','/mk-mernokseg/dolgozo');</script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;background:#0f1826;color:#dce8f5;min-height:100vh}
    header{background:#121d2e;border-bottom:1px solid #243347;padding:14px 28px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
    .brand{font-size:17px;font-weight:700}.brand span{color:#ef7a14}
    .hdr-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .hdr-right a,.hdr-right button{background:#1a2c42;border:1px solid #2b4668;color:#8fa4bc;padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer;text-decoration:none}
    .hdr-right a.hdr-admin{background:#0d2b1e;border-color:#166534;color:#86efac;font-weight:700}
    .layout{display:flex;min-height:calc(100vh - 57px)}
    .sidebar{width:240px;background:#0d1520;border-right:1px solid #1a2c42;padding:20px 0;flex-shrink:0}
    .sidebar-section{padding:6px 18px;font-size:11px;color:#4a6580;text-transform:uppercase;letter-spacing:.08em;margin-top:14px}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;font-size:14px;color:#8fa4bc;border-left:3px solid transparent;transition:.15s}
    .nav-item:hover{background:#131f30;color:#dce8f5}
    .nav-item.active{background:#131f30;color:#ef7a14;border-left-color:#ef7a14}
    .nav-item .icon{font-size:16px;width:20px;text-align:center}
    .main{flex:1;padding:28px 32px;overflow-y:auto}
    .page{display:none}.page.active{display:block}
    h2{font-size:20px;color:#ef7a14;margin-bottom:20px}
    .panel{background:#162233;border:1px solid #243347;border-radius:16px;padding:24px;margin-bottom:24px}
    .panel h3{font-size:15px;margin-bottom:14px;color:#dce8f5}
    label{display:block;font-size:13px;color:#8fa4bc;margin-bottom:4px;margin-top:10px}
    input,textarea,select{width:100%;padding:10px;border-radius:8px;border:1px solid #2b4668;background:#0f1826;color:#dce8f5;font-size:14px}
    input:focus,textarea:focus,select:focus{outline:none;border-color:#ef7a14}
    textarea{resize:vertical;min-height:80px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .btn{padding:11px 22px;border-radius:9px;border:none;font-size:14px;font-weight:700;cursor:pointer}
    .btn-primary{background:#ef7a14;color:#fff;margin-top:14px;width:100%}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed}
    .btn-sm{padding:5px 12px;border-radius:7px;border:none;font-size:12px;cursor:pointer;font-weight:700}
    .btn-edit{background:#1a3a5c;color:#60a5fa}
    .btn-del{background:#7f1d1d;color:#fca5a5}
    .btn-green{background:#0d2b1e;color:#86efac;border:1px solid #166534}
    .msg{border-radius:10px;padding:12px 16px;font-size:14px;margin-top:12px;display:none;line-height:1.5}
    .msg-ok{background:#0d2b1e;border:1px solid #166534;color:#86efac}
    .msg-err{background:#2c1215;border:1px solid #5c1a1a;color:#f87171}
    .msg-loading{background:#1a2c42;border:1px solid #2b4668;color:#8fa4bc}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid #8fa4bc;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:24px}
    .dash-card{background:#162233;border:1px solid #243347;border-radius:14px;padding:20px;cursor:pointer;transition:.15s;text-align:center}
    .dash-card:hover{border-color:#ef7a14;background:#1a2c3e}
    .dash-card .dc-icon{font-size:28px;margin-bottom:8px}
    .dash-card .dc-title{font-size:13px;font-weight:700;color:#dce8f5}
    .feed-item{background:#0f1826;border:1px solid #1a2c42;border-radius:10px;padding:14px 16px;margin-bottom:10px}
    .feed-title{font-size:14px;font-weight:700;color:#dce8f5;margin-bottom:4px}
    .feed-meta{font-size:12px;color:#4a6580}
    .badge{padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700}
    .badge-info{background:#0d1e2b;color:#60a5fa}
    .badge-warn{background:#2c1e0e;color:#ffb86c}
    .badge-ok{background:#0d2b1e;color:#86efac}
    .badge-err{background:#2c1215;color:#f87171}
    .badge-sv{background:#0d1e2b;color:#93c5fd}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;padding:8px 10px;color:#8fa4bc;border-bottom:1px solid #243347}
    td{padding:9px 10px;border-bottom:1px solid #1a2c42;vertical-align:middle}
    .no-access{display:flex;align-items:center;justify-content:center;height:80vh;flex-direction:column;gap:16px}
    .file-label{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;border:1px dashed #2b4668;background:#0f1826;cursor:pointer;color:#8fa4bc;font-size:13px;margin-top:10px}
    .file-label:hover{border-color:#ef7a14}
    .file-label input{display:none}
    .img-preview{max-width:100%;max-height:200px;border-radius:8px;margin-top:8px;display:none}
    .acc-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:12px 16px;background:#0f1826;border:1px solid #1a2c42;border-radius:10px;margin-bottom:6px}
    .acc-header:hover{border-color:#2b4668}
    .acc-body{display:none;padding:14px 16px;background:#0a1220;border:1px solid #1a2c42;border-top:none;border-radius:0 0 10px 10px;margin-bottom:6px}
    .acc-body.open{display:block}
    .proj-card{background:#0f1826;border:1px solid #1a2c42;border-radius:12px;padding:16px;margin-bottom:12px}
    .proj-card:hover{border-color:#2b4668}
    .proj-title{font-size:15px;font-weight:700;color:#dce8f5;margin-bottom:6px}
    .proj-meta{font-size:12px;color:#4a6580;margin-bottom:10px}
    .proj-desc{font-size:13px;color:#8fa4bc;margin-bottom:12px}
    .member-chip{display:inline-flex;align-items:center;gap:5px;background:#1a2c42;border:1px solid #2b4668;border-radius:999px;padding:3px 10px;font-size:12px;color:#8fa4bc;margin:2px}
    @media(max-width:700px){.layout{flex-direction:column}.sidebar{width:100%;border-right:none;border-bottom:1px solid #1a2c42;padding:8px 0}.main{padding:16px}.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header>
  <div class="brand">MK <span>Dolgozói Panel</span></div>
  <div class="hdr-right">
    <span id="userName" style="font-size:13px;color:#8fa4bc"></span>
    <a id="adminPanelBtn" href="/mk-mernokseg/admin" class="hdr-admin" style="display:none">🔧 Admin Panel</a>
    <a href="/mk-mernokseg/">← Főoldal</a>
    <button onclick="logout()">Kilépés</button>
  </div>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-section">Főoldal</div>
    <div class="nav-item active" onclick="showPage('dashboard')" data-page="dashboard"><span class="icon">🏠</span> Dashboard</div>

    <div class="sidebar-section">Projektek & Feladatok</div>
    <div class="nav-item" onclick="showPage('projektek')" data-page="projektek"><span class="icon">📁</span> Projektek</div>
    <div class="nav-item" onclick="showPage('feladatok')" data-page="feladatok"><span class="icon">✅</span> Feladataim</div>

    <div class="sidebar-section">Felhívások</div>
    <div class="nav-item" onclick="showPage('bejelentesek')" data-page="bejelentesek"><span class="icon">📢</span> Bejelentések</div>
    <div class="nav-item" onclick="showPage('hirek')" data-page="hirek"><span class="icon">📰</span> Hírek</div>
    <div class="nav-item" onclick="showPage('utasitasok')" data-page="utasitasok"><span class="icon">📋</span> Utasítások</div>

    <div class="sidebar-section">Naplók</div>
    <div class="nav-item" onclick="showPage('szolgalati')" data-page="szolgalati"><span class="icon">📓</span> Szolgálati napló</div>
    <div class="nav-item" onclick="showPage('tankolas')" data-page="tankolas"><span class="icon">⛽</span> Tankolás napló</div>
    <div class="nav-item" onclick="showPage('tarolo')" data-page="tarolo"><span class="icon">🏪</span> Tároló napl
